<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#090500" />
    </radialGradient>
    
    <!-- Gold/Amber Glow Gradient -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Base -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#amberGrad)" stroke-width="12" />

  <!-- Stylized Film Reel Icon in the Center -->
  <g transform="translate(128, 128) scale(8)" filter="url(#glow)">
    <!-- Film Reel Outer Circle -->
    <circle cx="16" cy="16" r="14" fill="none" stroke="url(#amberGrad)" stroke-width="2" />
    
    <!-- Center Core -->
    <circle cx="16" cy="16" r="3" fill="url(#amberGrad)" />
    
    <!-- Reel Spokes / Holes -->
    <circle cx="16" cy="7" r="2.2" fill="#090500" />
    <circle cx="16" cy="25" r="2.2" fill="#090500" />
    <circle cx="7" cy="16" r="2.2" fill="#090500" />
    <circle cx="25" cy="16" r="2.2" fill="#090500" />
    
    <!-- Diagonal Holes for 6-spoke look -->
    <circle cx="9.5" cy="9.5" r="2.2" fill="#090500" />
    <circle cx="22.5" cy="22.5" r="2.2" fill="#090500" />
    <circle cx="9.5" cy="22.5" r="2.2" fill="#090500" />
    <circle cx="22.5" cy="9.5" r="2.2" fill="#090500" />

    <!-- Subtle Cine Lines / Grooves -->
    <circle cx="16" cy="16" r="10" fill="none" stroke="url(#amberGrad)" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.6" />
  </g>
</svg>